#
# Prod Build & Deploy Entry Point
#
# Purpose:
#   Triggers build and deployment pipeline when a production tag is pushed.
#   Only tagged commits deploy to production.
#
# Trigger:
#   - Push of tag matching v*.*.* (e.g., v1.0.0, v1.0.1)
#
# What it does:
#   1. Detects what changed since the previous tag
#   2. Passes control to deploy-orchestrator.yml with env=prod
#   3. Conditionally deploys backend/mobile to production environment
#   4. Uses 'latest' Docker tag and production app schemes
#   5. Displays summary of results
#
# Related Workflows:
#   • .github/workflows/deploy-orchestrator.yml (core orchestration logic)
#   • .github/workflows/qa-build.yml (QA entry point)
#   • .github/workflows/auto-tag-release.yml (auto-creates tags on PR close)
#
name: Prod Build & Deploy

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: prod-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      android: ${{ steps.changes.outputs.android }}
      ios: ${{ steps.changes.outputs.ios }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: changes
        run: |
          # For production (main branch), compare against the previous tag
          # Get the most recent tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "❌ No previous tags found. Cannot determine changes."
            echo "Please ensure tags exist for version comparison."
            exit 1
          fi
          
          CURRENT_TAG="${{ github.ref_name }}"
          echo "Current tag: $CURRENT_TAG"
          echo "Comparing against previous tag: $PREVIOUS_TAG"
          echo ""
          
          # Check if backend files changed
          if git diff --name-only $PREVIOUS_TAG $CURRENT_TAG | grep -q "^apps/smart-pocket-backend/"; then
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "✅ Changes detected in backend files."
          else
            echo "backend=false" >> $GITHUB_OUTPUT
            echo "⊘ No changes detected in backend files."
          fi
          
          # Check if mobile files changed
          if git diff --name-only $PREVIOUS_TAG $CURRENT_TAG | grep -q "^apps/smart-pocket-mobile/"; then
            echo "android=true" >> $GITHUB_OUTPUT
            echo "ios=true" >> $GITHUB_OUTPUT
            echo "✅ Changes detected in mobile files."
          else
            echo "android=false" >> $GITHUB_OUTPUT
            echo "ios=false" >> $GITHUB_OUTPUT
            echo "⊘ No changes detected in mobile files."
          fi

      - name: Output detection results
        run: |
          echo "✅ Detection complete:"
          echo "- Backend changed: ${{ steps.changes.outputs.backend }}"
          echo "- Android changed: ${{ steps.changes.outputs.android }}"
          echo "- iOS changed: ${{ steps.changes.outputs.ios }}"

  deploy:
    name: Orchestrate Prod Build & Deploy
    needs: detect-changes
    uses: ./.github/workflows/deploy-orchestrator.yml
    with:
      env: prod
      backend: ${{ needs.detect-changes.outputs.backend }}
      android: ${{ needs.detect-changes.outputs.android }}
      ios: ${{ needs.detect-changes.outputs.ios }}
    secrets: inherit
    permissions:
      contents: read
      packages: write
