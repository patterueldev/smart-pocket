name: Frontend - Build & Deploy

on:
  workflow_call:
    inputs:
      env:
        required: true
        type: string
        description: 'Deployment environment: qa or prod'
    permissions:
      contents: read
      packages: write

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
          
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=raw,value=${{ inputs.env == 'prod' && 'latest' || 'staging' }}
            type=sha,prefix=${{ inputs.env == 'prod' && 'latest-' || 'staging-' }}
            type=ref,event=branch

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./apps/smart-pocket-web
          file: ./infrastructure/docker/Frontend.release.dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Output image details
        run: |
          echo "✅ Image built and pushed successfully"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

  summary:
    name: Frontend Deployment Summary
    needs: [build-frontend]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          ENV_NAME="${{ inputs.env }}"
          ENV_LABEL=$([ "$ENV_NAME" == "prod" ] && echo "Production" || echo "QA")
          IMAGE_TAG=$([ "$ENV_NAME" == "prod" ] && echo "latest" || echo "staging")
          
          echo "## 🚀 $ENV_LABEL Web Frontend Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.build-frontend.result }}" == "success" ]; then
            echo "✅ **Build & Push**: Success" >> $GITHUB_STEP_SUMMARY
            echo "- Image: \`ghcr.io/${{ github.repository }}/frontend:$IMAGE_TAG\`" >> $GITHUB_STEP_SUMMARY
            echo "- Environment: \`$ENV_LABEL\`" >> $GITHUB_STEP_SUMMARY
            echo "- Digest: \`${{ needs.build-frontend.outputs.image_digest }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Build & Push**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
