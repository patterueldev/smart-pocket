#
# Auto Tag Release
#
# Purpose:
#   Automatically creates and pushes a version tag when commits are pushed to main.
#   Extracts versions from all apps and uses the maximum version for the tag.
#   Explicitly triggers prod-build.yml via repository_dispatch (not via tag push).
#
# Trigger:
#   - Push to main branch (which occurs after PR merge)
#
# What it does:
#   1. Reads versions from all affected apps (backend, mobile, web)
#   2. Determines the greatest version across all apps
#   3. Creates annotated tag: v{max_version}
#   4. Pushes tag to remote
#   5. Explicitly triggers prod-build.yml with tag via repository_dispatch
#
# Related Workflows:
#   • .github/workflows/prod-build.yml (triggered via repository_dispatch)
#   • .github/workflows/pr-base-checks.yml (enforces rc/* or hotfix/* for main)
#
# Notes:
#   - Runs on every push to main (should be idempotent - only creates tag if not exists)
#   - Only apps with changes get version bumps (backend, mobile, web have independent versions)
#   - Tag format: v1.0.0 (semantic versioning)
#   - Tag uses the greatest version across all apps
#   - Only creates tag if version doesn't already exist
#   - Uses repository_dispatch instead of tag push event (avoids GITHUB_TOKEN security restriction)
#
name: Auto Tag Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write

jobs:
  create-tag:
    name: Create Release Tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git credentials
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Read versions from all apps
        id: version
        run: |
          # Read versions from each app
          BACKEND_VERSION=$(jq -r '.version' apps/smart-pocket-backend/package.json)
          MOBILE_VERSION=$(jq -r '.version' apps/smart-pocket-mobile/package.json)
          WEB_VERSION=$(jq -r '.version' apps/smart-pocket-web/package.json)
          
          echo "Backend version: $BACKEND_VERSION"
          echo "Mobile version: $MOBILE_VERSION"
          echo "Web version: $WEB_VERSION"
          
          # Find the greatest version
          # Sort versions and take the last (greatest) one
          VERSION=$(printf "%s\n%s\n%s" "$BACKEND_VERSION" "$MOBILE_VERSION" "$WEB_VERSION" | sort -V | tail -1)
          TAG="v$VERSION"
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          
          echo "Greatest version across all apps: $VERSION"
          echo "Tag to create: $TAG"

      - name: Check if tag already exists
        id: tag-exists
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag-exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists"
          else
            echo "tag-exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG does not exist, will create it"
          fi

      - name: Create and push tag
        if: steps.tag-exists.outputs.tag-exists == 'false'
        id: create-tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_MSG=$(git log -1 --pretty=%B $COMMIT_SHA)
          
          # Create annotated tag with commit info
          git tag -a "$TAG" -m "Release $TAG

          Commit: $COMMIT_SHA
          Message: $COMMIT_MSG"
          
          # Push tag to remote
          git push origin "$TAG"
          
          echo "Tag $TAG created and pushed"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Trigger production build
        if: steps.tag-exists.outputs.tag-exists == 'false'
        run: |
          TAG="${{ steps.create-tag.outputs.tag }}"
          echo "Triggering prod-build.yml with tag: $TAG"
          gh api repos/${{ github.repository }}/dispatches \
            -f event_type='trigger-prod-build' \
            -F client_payload='{"tag":"'$TAG'"}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if tag exists
        if: steps.tag-exists.outputs.tag-exists == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          echo "Tag $TAG already exists - skipping creation"
          echo "Ensure version in package.json is bumped to create a new tag"
