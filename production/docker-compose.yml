services:
  smart-pocket-prod-backend:
    image: ghcr.io/patterueldev/smart-pocket/backend:latest
    container_name: smart-pocket-prod-backend
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: 
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARED_TOKEN}