# Smart Pocket Development Nginx Configuration
# Routes:
#   / -> redirect to /ui
#   /api/* -> backend on localhost:3000
#   /ui/* -> frontend on localhost:5173
#   WebSocket support for Vite HMR

# Run nginx as unprivileged user
user nginx;

# Auto-detect number of CPU cores
worker_processes auto;

# Increase file descriptor limit for production-like testing
worker_rlimit_nofile 65535;

# Error log
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  # Connections per worker process
  worker_connections 2048;
  use epoll;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging format: combined with response time
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rt=$request_time uct="$upstream_connect_time" '
                  'uht="$upstream_header_time" urt="$upstream_response_time"';

  access_log /var/log/nginx/access.log main;

  # Performance optimizations
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 20M;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml text/javascript 
             application/json application/javascript application/xml+rss 
             application/rss+xml font/truetype font/opentype 
             application/vnd.ms-fontobject image/svg+xml;

  # Upstream definitions
  # Backend API server
  upstream backend {
    server [::1]:3000;
    keepalive 32;
  }

  # Frontend dev server (Vite)
  upstream frontend {
    server [::1]:5173;
    keepalive 32;
  }

  # Include all server configurations
  include /etc/nginx/conf.d/*.conf;
}
