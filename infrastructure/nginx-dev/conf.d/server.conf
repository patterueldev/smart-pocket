# Smart Pocket Server Configuration
# Handles routing for dev environment

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  # Redirect root to /ui only for remote domains
  # For localhost, serve directly without redirect (no /ui prefix needed)
  location = / {
    # Only redirect if NOT localhost
    if ($host != "localhost" && $host != "127.0.0.1" && $host !~ "^localhost:[0-9]+") {
      return 301 /ui/;
    }
    # For localhost/127.0.0.1, proxy directly to frontend
    proxy_pass http://frontend/;
    
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  # ============================================================
  # API Routes -> Backend (localhost:3000)
  # ============================================================
  # Routes: /api/*, /health
  
  location /api/ {
    # Proxy settings for backend
    proxy_pass http://backend/;
    
    # Preserve original request information
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Connection settings
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    
    # Timeout settings
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  # Health check endpoint for backend
  location /health {
    proxy_pass http://backend/health;
    access_log off;
  }

  # ============================================================
  # UI Routes -> Frontend (localhost:5173)
  # ============================================================
  # Routes: /ui/*, and assets
  
  location /ui/ {
    # Proxy to Vite dev server
    proxy_pass http://frontend/;
    
    # Preserve original request information
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # HTTP/1.1 for connection reuse
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    
    # Timeout settings for frontend dev server
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    
    # Disable buffering for live reloading
    proxy_buffering off;
  }

  # ============================================================
  # WebSocket Support for Vite HMR (Hot Module Replacement)
  # ============================================================
  # Vite dev server uses WebSocket at /@vite/ws
  
  location /@vite/ws {
    proxy_pass http://frontend/@vite/ws;
    
    # WebSocket upgrade headers
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    
    # Preserve original request information
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # WebSocket timeout settings (higher than regular HTTP)
    proxy_connect_timeout 10s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
  }

  # ============================================================
  # Static Assets
  # ============================================================
  # CSS, JavaScript, images served from frontend with cache
  
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    proxy_pass http://frontend;
    
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Cache static assets in browser
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
  }

  # ============================================================
  # Catch-all: Proxy unknown routes to frontend (for SPA routing)
  # ============================================================
  # All unmatched routes are proxied to frontend for client-side routing
  location / {
    proxy_pass http://frontend/;
    
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  # ============================================================
  # Error Pages
  # ============================================================
  error_page 404 /404.html;
  error_page 500 502 503 504 /50x.html;
  location = /50x.html {
    root /usr/share/nginx/html;
  }
}
